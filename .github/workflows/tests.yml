name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies and Playwright browsers
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run pytest and save exit code
        run: |
          mkdir -p allure-results
          set +e
          pytest -m regression --alluredir=allure-results -v
          TEST_EXIT_CODE=$?
          echo "$TEST_EXIT_CODE" > pytest_exit_code.txt
          exit 0

      - name: Install Allure commandline
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          npm install -g allure-commandline@2.32.0
          allure --version

      - name: Generate Allure report
        if: always()
        run: |
          if find allure-results -type f | grep -q .; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            cat > allure-report/index.html <<'HTML'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8">
              <title>Allure report</title>
            </head>
            <body>
              <h1>Allure report was not generated</h1>
              <p>В папке allure-results нет результатов. Проверь, что тесты действительно запустились и что pytest использует параметр --alluredir=allure-results.</p>
            </body>
          </html>
          HTML
          fi

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report

      - name: Configure GitHub Pages
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

      - name: Fail workflow if tests failed
        if: always()
        run: |
          if [ -f pytest_exit_code.txt ]; then
            exit "$(cat pytest_exit_code.txt)"
          else
            echo "pytest_exit_code.txt was not created"
            exit 1
          fi

  deploy-report:
    needs: run-tests
    if: ${{ always() && needs.run-tests.result != 'cancelled' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write
      actions: read

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5